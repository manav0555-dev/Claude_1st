<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer blue crescent (left arc) -->
  <path d="M 40,100
           C 40,55 70,15 115,10
           C 70,10 20,45 20,100
           C 20,155 70,190 115,190
           C 70,185 40,145 40,100 Z"
        fill="#3AABE0"/>
  <!-- Inner tan/gold arc (right arc) -->
  <path d="M 160,100
           C 160,145 130,185 85,190
           C 130,190 180,155 180,100
           C 180,45 130,10 85,10
           C 130,15 160,55 160,100 Z"
        fill="#C4AB82"/>
  <!-- Circle outline (inner ring) -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#3AABE0" stroke-width="4" opacity="0.3"/>
  <!-- Letter A -->
  <text x="58" y="120" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="60" fill="#3AABE0">A</text>
  <!-- Letter E (three horizontal lines) -->
  <line x1="95" y1="78" x2="125" y2="78" stroke="#3AABE0" stroke-width="5" stroke-linecap="round"/>
  <line x1="95" y1="100" x2="125" y2="100" stroke="#3AABE0" stroke-width="5" stroke-linecap="round"/>
  <line x1="95" y1="122" x2="125" y2="122" stroke="#3AABE0" stroke-width="5" stroke-linecap="round"/>
  <!-- Letter H -->
  <text x="122" y="120" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="60" fill="#C4AB82">H</text>
  <!-- Bottom blue swoosh -->
  <path d="M 30,170 Q 100,200 170,170" fill="none" stroke="#3AABE0" stroke-width="3"/>
</svg>
