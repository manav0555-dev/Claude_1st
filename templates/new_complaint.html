{% extends "base.html" %}
{% block title %}New Complaint - Air Excel HVAC Solutions{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Complaint</h1>
    <a href="{{ url_for('complaints_list') }}" class="btn btn-secondary">Back to List</a>
</div>

<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" class="form-control" required placeholder="Brief complaint summary">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-control">
                    <option value="">Select category...</option>
                    <option value="Installation">Installation</option>
                    <option value="Repair">Repair</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Noise/Vibration">Noise/Vibration</option>
                    <option value="Temperature">Temperature</option>
                    <option value="Airflow">Airflow</option>
                    <option value="Leak">Leak</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Billing">Billing</option>
                    <option value="Professionalism">Professionalism</option>
                    <option value="Timeliness">Timeliness</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" class="form-control" required placeholder="Detailed complaint description..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="customer_name">Customer Name *</label>
                <input type="text" id="customer_name" name="customer_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="customer_phone">Customer Phone</label>
                <input type="tel" id="customer_phone" name="customer_phone" class="form-control" placeholder="+91 XXXX XXX XXX">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="job_site_id">Client / Site</label>
                <select id="job_site_id" name="job_site_id" class="form-control" onchange="toggleOtherSite(this)">
                    <option value="">Select client...</option>
                    <optgroup label="Installation Work Running">
                        {% for s in job_sites if s['site_type'] == 'Installation' %}
                        <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="AMC">
                        {% for s in job_sites if s['site_type'] == 'AMC' %}
                        <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                        {% endfor %}
                    </optgroup>
                    {% if job_sites|selectattr('site_type', 'equalto', 'Other')|list %}
                    <optgroup label="Other">
                        {% for s in job_sites if s['site_type'] == 'Other' %}
                        <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endif %}
                    <option value="other">-- Other (type client name) --</option>
                </select>
                <input type="text" id="other_site_name" name="other_site_name" class="form-control"
                       placeholder="Enter client / site name" style="display:none; margin-top:8px;">
            </div>
            <div class="form-group">
                <label for="technician_id">Assign Technician</label>
                <select id="technician_id" name="technician_id" class="form-control">
                    <option value="">Unassigned</option>
                    {% for t in technicians %}
                    <option value="{{ t['id'] }}">{{ t['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="priority">Priority (1 = Critical, 5 = Minimal)</label>
            <select id="priority" name="priority" class="form-control">
                <option value="1">1 - Critical</option>
                <option value="2">2 - High</option>
                <option value="3" selected>3 - Medium</option>
                <option value="4">4 - Low</option>
                <option value="5">5 - Minimal</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Create Complaint</button>
    </form>
</div>
<script>
function toggleOtherSite(sel) {
    var inp = document.getElementById('other_site_name');
    inp.style.display = sel.value === 'other' ? 'block' : 'none';
    if (sel.value !== 'other') inp.value = '';
}
</script>
{% endblock %}
